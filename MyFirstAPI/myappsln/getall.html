<!DOCTYPE html>
<html>

<head>
    <title>Get All Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2>All Employees</h2>

    <button class="btn btn-primary mb-3" onclick="loadEmployees()">
        Load Employees
    </button>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Salary</th>
            </tr>
        </thead>

        <tbody id="employee"></tbody>
    </table>

<script>
    // ✅ Correct API URL
    const API = "https://localhost:7084/api/Employee";

    function loadEmployees() {
        fetch(API) // ✅ GET all employees
            .then(res => {
                if (!res.ok) {
                    throw new Error("HTTP error " + res.status);
                }
                return res.json();
            })
            .then(data => {
                let rows = "";

                data.forEach(emp => {
                    rows += `
                        <tr>
                            <td>${emp.firstName} ${emp.lastName}</td>
                            <td>${emp.email}</td>
                            <td>${emp.phoneNumber}</td>
                            <td>${emp.salary}</td>
                        </tr>
                    `;
                });

                document.getElementById("employee").innerHTML = rows;
            })
            .catch(err => {
                console.error("Error:", err);
                alert("Failed to load employees");
            });
    }
</script>

</body>
</html>
