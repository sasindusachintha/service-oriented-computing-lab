<!DOCTYPE html>
<html>
<head>
    <title>Delete Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2>Delete Employee</h2>

    <button class="btn btn-primary mb-3" onclick="loadEmployees()">
        Load Employees
    </button>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Position</th>
                <th>Department</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="employeeTable"></tbody>
    </table>

<script>
    const API = "https://localhost:7084/api/Employee";

    // ✅ Load Employees
    function loadEmployees() {
    fetch(API ) // change if needed
        .then(async res => {

            if (!res.ok) {
                const text = await res.text();
                throw new Error(text);
            }

            return res.json();
        })
        .then(data => {

            console.log("API DATA:", data); // 🔍 DEBUG

            // ✅ Handle object vs array
            const employees = Array.isArray(data) ? data : data.$values || [];

            let rows = "";

            employees.forEach(emp => {
                rows += `
                    <tr>
                        <td>${emp.employeeId}</td>
                        <td>${emp.firstName} ${emp.lastName}</td>
                        <td>${emp.email}</td>
                        <td>${emp.position}</td>
                        <td>${emp.department}</td>
                        <td>
                            <button class="btn btn-danger btn-sm"
                                onclick="deleteEmployee(${emp.employeeId})">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById("employeeTable").innerHTML = rows;
        })
        .catch(err => {
            console.error("LOAD ERROR:", err);
            alert("Error loading employees");
        });
}

    // ✅ Delete Employee
    function deleteEmployee(id) {

    console.log("Deleting ID:", id); // should NOT be undefined now

    if (!id) {
        alert("Invalid employee ID!");
        return;
    }

    if (!confirm("Are you sure you want to delete this employee?")) {
        return;
    }

    fetch(API + "/" + id, {
        method: "DELETE"
    })
    .then(async res => {
        const text = await res.text();

        if (!res.ok) {
            throw new Error(text);
        }
    })
    .then(() => {
        alert("✅ Deleted successfully!");
        loadEmployees();
    })
    .catch(err => {
        console.error(err);
        alert("❌ " + err.message);
    });
}
</script>

</body>
</html>
